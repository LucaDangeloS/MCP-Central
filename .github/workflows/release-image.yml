name: release-image

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Compute image name
        id: image
        run: |
          owner="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          repo="$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner}/${repo}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build image
        run: |
          docker build \
            -t "${{ steps.image.outputs.name }}:${{ github.ref_name }}" \
            -t "${{ steps.image.outputs.name }}:latest" \
            .

      - name: Push image
        run: |
          docker push "${{ steps.image.outputs.name }}:${{ github.ref_name }}"
          docker push "${{ steps.image.outputs.name }}:latest"