name: release-image

on:
  push:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Compute image tags
        id: tags
        run: |
          ref_tag="$(echo "${GITHUB_REF_NAME}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9_.-]+/-/g; s/^-+//; s/-+$//')"
          if [[ -z "$ref_tag" ]]; then
            ref_tag="${GITHUB_SHA::12}"
          fi
          echo "ref_tag=${ref_tag}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Compute image name
        id: image
        run: |
          owner="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          repo="$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner}/${repo}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build image
        run: |
          docker build \
            -t "${{ steps.image.outputs.name }}:${{ steps.tags.outputs.ref_tag }}" \
            -t "${{ steps.image.outputs.name }}:${{ steps.tags.outputs.sha_tag }}" \
            -t "${{ steps.image.outputs.name }}:latest" \
            .

      - name: Push image
        run: |
          docker push "${{ steps.image.outputs.name }}:${{ steps.tags.outputs.ref_tag }}"
          docker push "${{ steps.image.outputs.name }}:${{ steps.tags.outputs.sha_tag }}"
          docker push "${{ steps.image.outputs.name }}:latest"
